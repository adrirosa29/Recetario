<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#4A5D3A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Recetario">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<title>Recetario</title>
<style>
  :root{
    --crema:#FAF6EF;
    --crema-osc:#F0E9DB;
    --oliva:#4A5D3A;
    --oliva-osc:#37452B;
    --terracota:#C8704F;
    --carbon:#2B2622;
    --dorado:#D4A04C;
    --linea:#E4DBC8;
    --blanco-papel:#FFFDF9;
    --rojo-error:#B3432B;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--crema);
    color:var(--carbon);
    font-family:'Source Sans Pro', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-font-smoothing:antialiased;
    overscroll-behavior-y: none;
  }
  @font-face{
    font-family:'fallback-serif';
    src:local('Georgia');
  }
  .serif{ font-family: 'Iowan Old Style','Palatino Linotype', Georgia, 'fallback-serif', serif; }
  #root{min-height:100vh; display:flex; flex-direction:column;}

  /* ---- Top bar ---- */
  .topbar{
    position:sticky; top:0; z-index:20;
    background:var(--crema);
    padding:calc(env(safe-area-inset-top) + 18px) 20px 14px;
    border-bottom:1px solid var(--linea);
    display:flex; align-items:center; justify-content:space-between;
  }
  .brand{ display:flex; align-items:center; gap:10px; }
  .stamp{
    width:34px;height:34px;border-radius:50%;
    border:1.5px solid var(--oliva);
    display:flex;align-items:center;justify-content:center;
    font-family:'fallback-serif',serif; font-size:15px; color:var(--oliva); font-style:italic;
    flex-shrink:0;
  }
  .brand h1{ font-size:21px; margin:0; font-weight:600; letter-spacing:-0.2px;}
  .icon-btn{
    width:40px;height:40px;border-radius:50%;
    background:var(--oliva); color:var(--crema);
    border:none; display:flex; align-items:center; justify-content:center;
    font-size:22px; cursor:pointer; line-height:0;
  }
  .icon-btn:active{ transform: scale(0.94); }
  .icon-btn.ghost{ background:transparent; color:var(--oliva); border:1.5px solid var(--oliva); }

  main{ flex:1; padding:18px 20px 140px; max-width:640px; margin:0 auto; width:100%; }

  /* ---- search ---- */
  .search-wrap{ margin-bottom:18px; position:relative; }
  .search-wrap input{
    width:100%; padding:12px 16px 12px 40px; border-radius:14px;
    border:1px solid var(--linea); background:var(--blanco-papel);
    font-size:15px; color:var(--carbon);
  }
  .search-wrap input::placeholder{ color:#9b9182; }
  .search-wrap input:focus{ outline:2px solid var(--oliva); outline-offset:1px; }
  .search-icon{ position:absolute; left:14px; top:50%; transform:translateY(-50%); opacity:0.5; font-size:15px; }

  .filters{ display:flex; gap:8px; overflow-x:auto; margin-bottom:20px; padding-bottom:4px; scrollbar-width:none; }

  /* ---- Pantalla de selección de categoría ---- */
  .back-btn{
    width:32px; height:32px; border-radius:50%; border:1.5px solid var(--linea); background:var(--blanco-papel);
    color:var(--oliva); font-size:17px; display:flex; align-items:center; justify-content:center;
    cursor:pointer; margin-right:2px; flex-shrink:0;
  }
  .cat-grid{
    display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:8px;
  }
  .cat-card{
    aspect-ratio:1; border-radius:20px; cursor:pointer; position:relative; overflow:hidden;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;
    border:1px solid var(--linea); transition:transform .15s ease;
  }
  .cat-card:active{ transform:scale(0.96); }
  .cat-card-icon{ font-size:36px; line-height:1; position:relative; }
  .cat-card-icon-extra{ font-size:18px; position:absolute; bottom:-4px; right:-14px; }
  .cat-card-label{ font-size:16px; font-weight:700; font-family:'fallback-serif',serif; }
  .cat-card-count{ font-size:11.5px; opacity:0.65; font-weight:600; }

  .cat-desayuno{ background:linear-gradient(150deg, #FCEFCB, #F7DFA0); color:#8a6a1a; }
  .cat-comida{ background:linear-gradient(150deg, #E6ECDC, #CBDAB4); color:#46562f; }
  .cat-cena{ background:linear-gradient(150deg, #DDE3EC, #B9C5DB); color:#33415c; }
  .cat-postre{ background:linear-gradient(150deg, #F6DDE3, #EFC0CB); color:#8a3a4d; }
  .cat-snack{ background:linear-gradient(150deg, #EFE3D6, #DCC7AC); color:#6b4d2c; }
  .cat-bebida{ background:linear-gradient(150deg, #DCEAE8, #B7D6D1); color:#2d5650; }

  .ver-todas-btn{
    width:100%; padding:13px; border-radius:14px; border:1.5px dashed var(--linea); background:transparent;
    color:var(--oliva); font-size:14px; font-weight:600; cursor:pointer; margin-top:16px;
  }
  .list-category-title{
    display:flex; align-items:center; gap:10px; margin-bottom:18px;
  }
  .list-category-icon{ font-size:26px; line-height:1; }
  .list-category-title h2{ font-size:21px; font-weight:700; margin:0; font-family:'fallback-serif',serif; }
  .filters::-webkit-scrollbar{display:none;}
  .chip{
    flex-shrink:0; padding:7px 14px; border-radius:100px; font-size:13px;
    border:1px solid var(--linea); background:var(--blanco-papel); color:var(--carbon);
    cursor:pointer; white-space:nowrap;
  }
  .chip.active{ background:var(--oliva); color:var(--crema); border-color:var(--oliva); }

  /* ---- recipe cards (fichero) ---- */
  .card-list{ display:flex; flex-direction:column; gap:12px; }
  .recipe-card{
    background:var(--blanco-papel);
    border:1px solid var(--linea);
    border-radius:16px;
    padding:16px;
    display:flex; gap:14px; align-items:center;
    cursor:pointer;
    position:relative;
    transition:transform .12s ease;
  }
  .recipe-card:active{ transform: scale(0.985); }
  .recipe-card .tab{
    position:absolute; top:-1px; left:18px;
    background:var(--dorado); color:var(--carbon);
    font-size:10px; font-weight:700; letter-spacing:0.5px; text-transform:uppercase;
    padding:3px 9px; border-radius:0 0 6px 6px;
  }
  .stamp-sm{
    width:46px;height:46px;border-radius:50%;flex-shrink:0;
    border:1.5px solid var(--oliva); color:var(--oliva);
    display:flex;align-items:center;justify-content:center; font-size:20px;
  }
  .recipe-card .info{ flex:1; min-width:0; }
  .recipe-card h3{ margin:2px 0 4px; font-size:17px; font-weight:600; }
  .meta-row{ display:flex; gap:10px; font-size:12.5px; color:#7a7163; flex-wrap:wrap; }
  .meta-row span{ display:flex; align-items:center; gap:3px; }
  .kcal-badge{
    font-size:12.5px; font-weight:700; color:var(--terracota);
    background:rgba(200,112,79,0.1); padding:3px 9px; border-radius:8px; flex-shrink:0;
  }

  .empty{
    text-align:center; padding:60px 20px; color:#9b9182;
  }
  .empty .stamp{ width:60px;height:60px;font-size:26px; margin:0 auto 16px; }
  .empty h3{ color:var(--carbon); font-size:18px; margin-bottom:6px; }
  .empty p{ font-size:14px; line-height:1.5; }

  /* ---- FAB ---- */
  .fab{
    position:fixed; bottom:96px; right:24px; z-index:30;
    width:58px;height:58px;border-radius:50%;
    background:var(--terracota); color:white; border:none;
    font-size:28px; box-shadow:0 6px 16px rgba(200,112,79,0.4);
    cursor:pointer; display:flex; align-items:center; justify-content:center;
  }
  .fab:active{ transform: scale(0.92); }

  .bottom-nav{
    position:fixed; bottom:0; left:0; right:0; z-index:25;
    background:var(--blanco-papel); border-top:1px solid var(--linea);
    display:flex; padding:8px 0 calc(env(safe-area-inset-bottom) + 8px);
  }
  .bottom-nav-item{
    flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
    background:none; border:none; padding:6px 0; cursor:pointer;
    color:#9b9182; font-size:11.5px; font-weight:600;
  }
  .bottom-nav-icon{ font-size:20px; line-height:1; filter:grayscale(1); opacity:0.6; }
  .bottom-nav-item.active{ color:var(--oliva); }
  .bottom-nav-item.active .bottom-nav-icon{ filter:none; opacity:1; }

  /* ---- Calendario ---- */
  .cal-main{ flex:1; padding:18px 20px 140px; max-width:640px; margin:0 auto; width:100%; }
  .cal-header{
    display:flex; align-items:center; justify-content:space-between; margin-bottom:6px;
  }
  .cal-header h2{ font-size:20px; font-weight:700; margin:0; text-transform:capitalize; }
  .cal-nav-btn{
    width:36px; height:36px; border-radius:50%; border:1.5px solid var(--linea); background:var(--blanco-papel);
    color:var(--oliva); font-size:16px; display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
  .cal-today-btn{
    font-size:12px; color:var(--oliva); font-weight:600; background:none; border:none; cursor:pointer;
    text-decoration:underline; margin-bottom:16px; padding:0;
  }

  .cal-summary-row{ display:flex; gap:10px; margin-bottom:20px; }
  .cal-summary-box{
    flex:1; background:var(--blanco-papel); border:1px solid var(--linea); border-radius:14px;
    padding:12px 10px; text-align:center;
  }
  .cal-summary-box .num{ font-size:18px; font-weight:700; color:var(--terracota); }
  .cal-summary-box .lbl{ font-size:10px; color:#8a8071; text-transform:uppercase; letter-spacing:0.3px; margin-top:2px; }

  .cal-weekdays{ display:grid; grid-template-columns:repeat(7,1fr); margin-bottom:6px; }
  .cal-weekdays span{ text-align:center; font-size:11px; color:#a39a8c; font-weight:700; }

  .cal-grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:5px; }
  .cal-day{
    aspect-ratio:1; border-radius:10px; border:1px solid var(--linea); background:var(--blanco-papel);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    cursor:pointer; position:relative; padding:2px; gap:2px;
  }
  .cal-day.other-month{ opacity:0.35; }
  .today-mark{
    position:absolute; top:4px; right:4px; width:6px; height:6px; border-radius:50%;
    background:var(--oliva); border:1px solid var(--blanco-papel);
  }
  .cal-day.past:not(.other-month){ background:var(--crema-osc); }
  .cal-day.past:not(.other-month) .daynum{ color:#a39a8c; }
  .cal-day.past:not(.other-month) .daykcal{ color:#b8a99a; }
  .cal-day.past:not(.other-month) .daydot{ background:#bcb6a8; }
  .cal-day .daynum{ font-size:12.5px; font-weight:600; color:var(--carbon); }
  .cal-day .daykcal{ font-size:9px; color:var(--terracota); font-weight:700; }
  .cal-day .daydots{ display:flex; gap:2px; margin-top:1px; }
  .cal-day .daydot{ width:4px; height:4px; border-radius:50%; background:var(--oliva); }

  .cal-day.obj-verde{ background:#E3EBD9; border-color:#C5D6AE; }
  .cal-day.obj-verde .daynum{ color:#3b5226; }
  .cal-day.obj-verde .daykcal{ color:#4d6b30; }
  .cal-day.obj-ambar{ background:#FBEAD0; border-color:#F0CE96; }
  .cal-day.obj-ambar .daynum{ color:#8a5a17; }
  .cal-day.obj-ambar .daykcal{ color:#9c6515; }
  .cal-day.obj-rojo{ background:#F6DAD3; border-color:#E8AD9C; }
  .cal-day.obj-rojo .daynum{ color:#8a3221; }
  .cal-day.obj-rojo .daykcal{ color:#9c3a26; }
  .cal-day.obj-verde.past, .cal-day.obj-ambar.past, .cal-day.obj-rojo.past{ opacity:0.75; }

  /* ---- Estadísticas ---- */
  .stats-row{ display:flex; gap:10px; margin-bottom:8px; }
  .stats-box{
    flex:1; background:var(--blanco-papel); border:1px solid var(--linea); border-radius:16px;
    padding:16px 10px; text-align:center;
  }
  .stats-num{ font-size:24px; font-weight:700; color:var(--terracota); line-height:1.1; }
  .stats-lbl{ font-size:10.5px; color:#8a8071; text-transform:uppercase; letter-spacing:0.3px; margin-top:6px; line-height:1.3; }
  .stats-box.obj-verde{ background:#E3EBD9; border-color:#C5D6AE; }
  .stats-box.obj-verde .stats-num{ color:#3b5226; }
  .stats-box.obj-verde .stats-lbl{ color:#4d6b30; }
  .stats-box.obj-ambar{ background:#FBEAD0; border-color:#F0CE96; }
  .stats-box.obj-ambar .stats-num{ color:#8a5a17; }
  .stats-box.obj-ambar .stats-lbl{ color:#9c6515; }
  .stats-box.obj-rojo{ background:#F6DAD3; border-color:#E8AD9C; }
  .stats-box.obj-rojo .stats-num{ color:#8a3221; }
  .stats-box.obj-rojo .stats-lbl{ color:#9c3a26; }

  .franjas-pager{
    display:flex; overflow-x:auto; scroll-snap-type:x mandatory;
    scrollbar-width:none; width:100%; touch-action:pan-x; -webkit-overflow-scrolling:touch;
  }
  .franjas-pager::-webkit-scrollbar{ display:none; }
  .franjas-page{
    flex:0 0 100%; flex-shrink:0; width:100%; scroll-snap-align:start; scroll-snap-stop:always;
    box-sizing:border-box; min-width:0;
  }
  .franjas-pager-dots{ display:flex; justify-content:center; gap:6px; margin:10px 0 8px; }
  .franjas-dot{ width:6px; height:6px; border-radius:50%; background:var(--linea); }
  .franjas-dot.active{ background:var(--oliva); width:16px; border-radius:100px; transition:width .2s ease; }

  .franja-stats-list{ display:flex; flex-direction:column; gap:10px; }
  .franja-stats-item{
    display:flex; align-items:center; gap:10px; background:var(--blanco-papel);
    border:1px solid var(--linea); border-radius:14px; padding:12px 14px;
  }
  .franja-stats-icon{ font-size:16px; flex-shrink:0; width:20px; text-align:center; }
  .franja-stats-label{ font-size:13.5px; font-weight:600; color:var(--carbon); flex:0 0 70px; flex-shrink:0; }
  .franja-stats-bar-wrap{
    flex:1; height:8px; background:var(--crema-osc); border-radius:100px; overflow:hidden; min-width:0;
  }
  .franja-stats-bar{
    height:100%; background:var(--terracota); border-radius:100px; transition:width .3s ease;
  }
  .franja-stats-num{ font-size:13px; font-weight:700; color:var(--terracota); flex-shrink:0; width:64px; text-align:right; }

  .objetivo-edit-row{ display:flex; align-items:center; gap:8px; margin-bottom:8px; flex-wrap:wrap; }
  .objetivo-edit-row input{
    flex:1 1 120px; min-width:0; padding:11px 14px; border-radius:12px; border:1px solid var(--linea);
    background:var(--blanco-papel); font-size:15px; color:var(--carbon);
  }
  .objetivo-edit-row input:focus{ outline:2px solid var(--oliva); outline-offset:1px; }
  .objetivo-unit{ font-size:13px; color:#8a8071; flex-shrink:0; }
  .objetivo-save-btn{
    flex:1 1 100%; padding:11px 16px; border-radius:12px; border:none; background:var(--oliva);
    color:var(--crema); font-size:14px; font-weight:700; cursor:pointer; margin-top:2px;
  }
  .objetivo-save-btn:disabled{ opacity:0.5; }
  .objetivo-display-row{
    display:flex; align-items:center; justify-content:space-between; background:var(--blanco-papel);
    border:1px solid var(--linea); border-radius:14px; padding:14px 16px; margin-bottom:8px;
  }
  .objetivo-display-num{ font-size:17px; font-weight:700; color:var(--carbon); }

  .objetivo-pct-row{ display:flex; gap:10px; margin-bottom:8px; }
  .objetivo-pct-box{ flex:1; border-radius:14px; padding:14px 8px; text-align:center; }
  .objetivo-pct-num{ font-size:20px; font-weight:700; }
  .objetivo-pct-lbl{ font-size:10px; margin-top:4px; line-height:1.3; font-weight:600; }
  .objetivo-pct-verde{ background:#E3EBD9; }
  .objetivo-pct-verde .objetivo-pct-num{ color:#3b5226; }
  .objetivo-pct-verde .objetivo-pct-lbl{ color:#4d6b30; }
  .objetivo-pct-ambar{ background:#FBEAD0; }
  .objetivo-pct-ambar .objetivo-pct-num{ color:#8a5a17; }
  .objetivo-pct-ambar .objetivo-pct-lbl{ color:#9c6515; }
  .objetivo-pct-rojo{ background:#F6DAD3; }
  .objetivo-pct-rojo .objetivo-pct-num{ color:#8a3221; }
  .objetivo-pct-rojo .objetivo-pct-lbl{ color:#9c3a26; }

  /* ---- panel de día (slide-up) ---- */
  .day-panel-overlay{
    position:fixed; inset:0; background:rgba(43,38,34,0.35); z-index:60;
    display:flex; align-items:flex-end;
  }
  .day-panel{
    background:var(--crema); border-radius:20px 20px 0 0; width:100%; max-height:85vh; overflow-y:auto;
    padding:20px 20px calc(env(safe-area-inset-bottom) + 24px);
  }
  .day-panel-handle{ width:36px; height:4px; background:var(--linea); border-radius:100px; margin:0 auto 16px; }
  .day-panel h3{ font-size:19px; margin:0 0 4px; text-transform:capitalize; }
  .day-panel .day-total{ font-size:13px; color:var(--terracota); font-weight:700; margin-bottom:18px; }

  .franja-block{ margin-bottom:16px; }
  .franja-block .franja-label{
    font-size:13px; font-weight:700; color:var(--oliva); display:flex; align-items:center; gap:6px; margin-bottom:8px;
  }
  .franja-slot{
    background:var(--blanco-papel); border:1px solid var(--linea); border-radius:12px;
    padding:12px 14px; display:flex; align-items:center; justify-content:space-between; gap:10px;
    min-height:24px;
  }
  .franja-slot.empty{ color:#a39a8c; font-size:14px; cursor:pointer; justify-content:center; border-style:dashed; }
  .franja-slot .slot-recipe-name{ font-size:14.5px; font-weight:600; flex:1; min-width:0; }
  .franja-slot .slot-kcal{ font-size:12px; color:#8a8071; flex-shrink:0; }
  .franja-slot .slot-remove{ background:none; border:none; color:#b8ad9a; font-size:18px; cursor:pointer; padding:0 2px; flex-shrink:0; }
  .slot-top-actions{ display:flex; align-items:center; gap:6px; flex-shrink:0; }
  .slot-edit{
    background:none; border:none; color:#a39a8c; font-size:14px; cursor:pointer; padding:2px 4px; flex-shrink:0;
  }
  .slot-edit:active{ color:var(--oliva); }
  .ajustado-badge{
    display:inline-block; font-size:10px; font-weight:700; color:#8a6a2a; background:rgba(212,160,76,0.15);
    padding:2px 7px; border-radius:100px; margin-left:7px; text-transform:uppercase; letter-spacing:0.2px;
    vertical-align:middle;
  }

  .edit-plan-item{ padding-bottom:calc(env(safe-area-inset-bottom) + 24px); }
  .edit-ing-row{
    display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--linea);
  }
  .edit-ing-row:last-child{ border-bottom:none; }
  .edit-ing-name{ flex:1; font-size:14.5px; color:var(--carbon); min-width:0; }
  .edit-ing-row input{
    width:70px; padding:8px 10px; border-radius:10px; border:1px solid var(--linea);
    background:var(--blanco-papel); font-size:14.5px; text-align:right;
  }
  .edit-ing-row input:focus{ outline:2px solid var(--oliva); outline-offset:1px; }
  .edit-ing-unidad{ font-size:13px; color:#8a8071; width:24px; flex-shrink:0; }
  .edit-total-row{
    display:flex; justify-content:space-between; align-items:center; margin-top:16px;
    padding-top:14px; border-top:1.5px solid var(--linea); font-size:14.5px; font-weight:600;
  }
  .edit-total-kcal{ color:var(--terracota); font-size:17px; font-weight:700; }

  .franja-slot.raciones-slot{ flex-direction:column; align-items:stretch; gap:8px; }
  .slot-top-line{ display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .slot-bottom-line{ display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .raciones-control{ display:flex; align-items:center; gap:10px; }
  .raciones-control button{
    width:26px; height:26px; border-radius:50%; border:1.5px solid var(--oliva); background:transparent;
    color:var(--oliva); font-size:15px; cursor:pointer; display:flex; align-items:center; justify-content:center;
    flex-shrink:0; line-height:1; padding:0;
  }
  .raciones-control button:disabled{ opacity:0.3; cursor:default; }
  .raciones-control button:not(:disabled):active{ background:var(--oliva); color:var(--crema); }
  .raciones-num{ font-size:12.5px; font-weight:600; color:var(--carbon); white-space:nowrap; }
  .raciones-slot .slot-kcal{ font-size:13px; font-weight:700; color:var(--terracota); }

  .recipe-picker-overlay{
