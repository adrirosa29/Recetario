<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;

// ---------- IndexedDB persistence ----------
const DB_NAME = "recetario-db";
const STORE = "recetas";
const STORE_ALIMENTOS = "alimentos_personales";
const STORE_PLAN = "planificacion";
const STORE_CONFIG = "configuracion";
function openDB(){
  return new Promise((resolve,reject)=>{
    const req = indexedDB.open(DB_NAME, 4);
    req.onupgradeneeded = (e)=>{
      const db = e.target.result;
      if(!db.objectStoreNames.contains(STORE)){
        db.createObjectStore(STORE, { keyPath: "id" });
      }
      if(!db.objectStoreNames.contains(STORE_ALIMENTOS)){
        db.createObjectStore(STORE_ALIMENTOS, { keyPath: "clave" });
      }
      if(!db.objectStoreNames.contains(STORE_PLAN)){
        db.createObjectStore(STORE_PLAN, { keyPath: "fecha" }); // fecha en formato "YYYY-MM-DD"
      }
      if(!db.objectStoreNames.contains(STORE_CONFIG)){
        db.createObjectStore(STORE_CONFIG, { keyPath: "clave" });
      }
    };
    req.onsuccess = ()=>resolve(req.result);
    req.onerror = ()=>reject(req.error);
  });
}
async function dbGetAll(){
  const db = await openDB();
  return new Promise((resolve,reject)=>{
    const tx = db.transaction(STORE, "readonly");
    const store = tx.objectStore(STORE);
    const req = store.getAll();
    req.onsuccess = ()=>resolve(req.result || []);
    req.onerror = ()=>reject(req.error);
  });
}
async function dbPut(recipe){
  const db = await openDB();
  return new Promise((resolve,reject)=>{
    const tx = db.transaction(STORE, "readwrite");
    tx.objectStore(STORE).put(recipe);
    tx.oncomplete = ()=>resolve();
    tx.onerror = ()=>reject(tx.error);
  });
}
async function dbDelete(id){
  const db = await openDB();
  return new Promise((resolve,reject)=>{
    const tx = db.transaction(STORE, "readwrite");
    tx.objectStore(STORE).delete(id);
    tx.oncomplete = ()=>resolve();
    tx.onerror = ()=>reject(tx.error);
  });
}

// --- Alimentos personales (guardados al introducir kcal/100g a mano) ---
async function dbGetAllAlimentos(){
  const db = await openDB();
  return new Promise((resolve,reject)=>{
    const tx = db.transaction(STORE_ALIMENTOS, "readonly");
    const req = tx.objectStore(STORE_ALIMENTOS).getAll();
    req.onsuccess = ()=>resolve(req.result || []);
    req.onerror = ()=>reject(req.error);
  });
}
async function dbPutAlimento(alimento){
  const db = await openDB();
  return new Promise((resolve,reject)=>{
    const tx = db.transaction(STORE_ALIMENTOS, "readwrite");
    tx.objectStore(STORE_ALIMENTOS).put(alimento);
    tx.oncomplete = ()=>resolve();
    tx.onerror = ()=>reject(tx.error);
  });
}

// --- Planificación de comidas (calendario) ---
async function dbGetAllPlan(){
  const db = await openDB();
  return new Promise((resolve,reject)=>{
    const tx = db.transaction(STORE_PLAN, "readonly");
    const req = tx.objectStore(STORE_PLAN).getAll();
    req.onsuccess = ()=>resolve(req.result || []);
    req.onerror = ()=>reject(req.error);
  });
}
async function dbPutPlanDia(diaPlan){
  const db = await openDB();
  return new Promise((resolve,reject)=>{
    const tx = db.transaction(STORE_PLAN, "readwrite");
    tx.objectStore(STORE_PLAN).put(diaPlan);
    tx.oncomplete = ()=>resolve();
    tx.onerror = ()=>reject(tx.error);
  });
}

// --- Configuración general (ej. objetivo de kcal diario) ---
async function dbGetConfig(clave){
  const db = await openDB();
  return new Promise((resolve,reject)=>{
    const tx = db.transaction(STORE_CONFIG, "readonly");
    const req = tx.objectStore(STORE_CONFIG).get(clave);
    req.onsuccess = ()=>resolve(req.result || null);
    req.onerror = ()=>reject(req.error);
  });
}
async function dbSetConfig(clave, valor){
  const db = await openDB();
  return new Promise((resolve,reject)=>{
    const tx = db.transaction(STORE_CONFIG, "readwrite");
    tx.objectStore(STORE_CONFIG).put({ clave, valor });
    tx.oncomplete = ()=>resolve();
    tx.onerror = ()=>reject(tx.error);
  });
}

// ---------- helpers ----------
const uid = ()=> Date.now().toString(36) + Math.random().toString(36).slice(2,8);

const CATEGORIAS = [
  {id:"desayuno", label:"Desayuno", icon:"☀"},
  {id:"comida", label:"Comida", icon:"🍲"},
  {id:"cena", label:"Cena", icon:"🌙"},
  {id:"postre", label:"Postre", icon:"🍰", iconExtra:"🍓"},
  {id:"snack", label:"Snack", icon:"🥨"},
  {id:"bebida", label:"Bebida", icon:"🥤"},
];
const catIcon = (id)=> (CATEGORIAS.find(c=>c.id===id)||{}).icon || "❋";
const catLabel = (id)=> (CATEGORIAS.find(c=>c.id===id)||{}).label || "Receta";

const UNIDADES = ["g","kg","ml","l","ud","cda","cdta","taza","pizca","al gusto"];
const UNIDADES_PROPORCIONALES = ["g","kg","ml","l"]; // admiten "kcal por 100g/ml"; el resto van por kcal totales directas

const FRANJAS = [
  {id:"desayuno", label:"Desayuno", icon:"☀"},
  {id:"almuerzo", label:"Almuerzo", icon:"🥪"},
  {id:"comida", label:"Comida", icon:"🍲"},
  {id:"merienda", label:"Merienda", icon:"🍪"},
  {id:"cena", label:"Cena", icon:"🌙"},
  {id:"otros", label:"Otros", icon:"✦"},
];
const MESES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const DIAS_SEMANA = ["L","M","X","J","V","S","D"];

function fechaToKey(date){
  const y = date.getFullYear();
  const m = (date.getMonth()+1).toString().padStart(2,'0');
  const d = date.getDate().toString().padStart(2,'0');
  return `${y}-${m}-${d}`;
}
function keyToFecha(key){
  const [y,m,d] = key.split('-').map(Number);
  return new Date(y, m-1, d);
}
function isSameDay(a,b){
  return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
}
// kcal por porción de una receta (total de ingredientes / porciones base)
function kcalPorPorcion(receta){
  if(!receta) return 0;
  const total = calcTotalKcalBase(receta.ingredientes||[]);
  const porciones = receta.porciones || 1;
  return porciones ? total/porciones : 0;
}

function round1(n){ return Math.round(n*10)/10; }

// total kcal for the recipe at BASE servings (sum of ingredient kcal contributions)
function calcTotalKcalBase(ingredientes){
  return ingredientes.reduce((sum,ing)=>{
    const k = parseFloat(ing.kcalTotal);
    return sum + (isNaN(k) ? 0 : k);
  }, 0);
}

// scale a quantity from base servings to target servings
function scaleQty(qty, baseServings, targetServings){
  const q = parseFloat(qty);
  if(isNaN(q) || !baseServings) return qty;
  return q * (targetServings/baseServings);
}

function fmtQty(n){
  if(n === "" || n===undefined || n===null || isNaN(n)) return "";
  const r = Math.round(n*100)/100;
  return (r % 1 === 0) ? r.toString() : r.toFixed(2).replace(/0$/,'').replace(/\.$/,'');
}

// ---------- Búsqueda nutricional: primero tabla personal, luego tabla local ----------
async function lookupKcalPer100g(query, alimentosPersonales){
  if(!query || query.trim().length < 2) return null;
  // 1. tabla personal del usuario (alimentos que él mismo ha guardado antes)
  const personal = searchPersonalFoodDB(query, alimentosPersonales || []);
  if(personal) return { ...personal, origen:"personal" };
  // 2. tabla local incorporada (~130 alimentos básicos)
  const local = searchLocalFoodDB(query);
  if(local) return { ...local, origen:"tabla" };
  return null;
}

// ---------- App ----------
function App(){
  const [recetas, setRecetas] = useState([]);
  const [alimentosPersonales, setAlimentosPersonales] = useState([]);
  const [plan, setPlan] = useState({}); // { "YYYY-MM-DD": {desayuno,comida,cena,otros} }
  const [objetivoKcal, setObjetivoKcal] = useState(null); // número o null si no se ha definido
  const [loaded, setLoaded] = useState(false);
  const [tab, setTab] = useState("recetario"); // recetario | calendario
  const [view, setView] = useState({ screen:"list" }); // list | detail | form
  const [search, setSearch] = useState("");
  const [filtro, setFiltro] = useState(null); // null = pantalla de categorías; "todas" o id de categoría = lista filtrada
  const [toast, setToast] = useState("");
  const toastTimer = useRef(null);

  useEffect(()=>{
    Promise.all([dbGetAll(), dbGetAllAlimentos(), dbGetAllPlan(), dbGetConfig("objetivoKcal")]).then(([recetasData, alimentosData, planData, configObjetivo])=>{
      setRecetas(recetasData.sort((a,b)=> (b.creadoEn||0)-(a.creadoEn||0)));
      setAlimentosPersonales(alimentosData);
      const planMap = {};
      planData.forEach(d=>{ planMap[d.fecha] = d; });
      setPlan(planMap);
      if(configObjetivo && configObjetivo.valor) setObjetivoKcal(configObjetivo.valor);
      setLoaded(true);
    }).catch(()=>setLoaded(true));
  },[]);

  const updateObjetivoKcal = useCallback(async (valor)=>{
    setObjetivoKcal(valor);
    await dbSetConfig("objetivoKcal", valor);
  },[]);

  const showToast = useCallback((msg)=>{
    setToast(msg);
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(()=>setToast(""), 1800);
  },[]);

  // Guarda (o actualiza) un alimento en la tabla personal para no repetir kcal/100g en el futuro
  const saveAlimentoPersonal = useCallback(async (nombre, kcal100)=>{
    if(!nombre || !nombre.trim() || isNaN(parseFloat(kcal100))) return;
    const clave = normalize(nombre.trim());
    const alimento = { clave, nombre: nombre.trim(), kcal100: parseFloat(kcal100), actualizadoEn: Date.now() };
    await dbPutAlimento(alimento);
    setAlimentosPersonales(prev=>{
      const existing = prev.filter(a=>a.clave!==clave);
      return [...existing, alimento];
    });
  },[]);

  // Normaliza un día del plan al nuevo formato de listas de {recetaId, raciones},
  // migrando formatos antiguos: id único suelto -> [{recetaId, raciones:1}]; lista de ids sueltos -> igual.
  const normalizeDiaPlan = (diaActual, fechaKey)=>{
    const base = diaActual || { fecha: fechaKey, desayuno:[], almuerzo:[], comida:[], merienda:[], cena:[], otros:[] };
    const normalized = { fecha: fechaKey };
    FRANJAS.forEach(f=>{
      const val = base[f.id];
      let lista = [];
      if(Array.isArray(val)) lista = val;
      else if(val) lista = [val];
      // migrar cada elemento: si es un string (id suelto antiguo), convertir a {recetaId, raciones:1}
      normalized[f.id] = lista.map(item=>
        (typeof item === 'string') ? { recetaId: item, raciones: 1 } : item
      );
    });
    return normalized;
  };

  // Añade una receta a una franja de un día concreto (no sobrescribe, se acumula), con 1 ración por defecto
  const addToPlanSlot = useCallback(async (fechaKey, franjaId, recetaId)=>{
    setPlan(prev=>{
      const diaNuevo = normalizeDiaPlan(prev[fechaKey], fechaKey);
      diaNuevo[franjaId] = [...diaNuevo[franjaId], { recetaId, raciones: 1 }];
      dbPutPlanDia(diaNuevo);
      return { ...prev, [fechaKey]: diaNuevo };
    });
  },[]);

  // Quita el elemento en la posición `index` de una franja de un día concreto
  const removeFromPlanSlot = useCallback(async (fechaKey, franjaId, index)=>{
    setPlan(prev=>{
      const diaNuevo = normalizeDiaPlan(prev[fechaKey], fechaKey);
      diaNuevo[franjaId] = diaNuevo[franjaId].filter((_,i)=>i!==index);
      dbPutPlanDia(diaNuevo);
      return { ...prev, [fechaKey]: diaNuevo };
    });
  },[]);

  // Cambia el número de raciones consumidas de un elemento ya añadido (mínimo 1)
  const updatePlanSlotRaciones = useCallback(async (fechaKey, franjaId, index, nuevasRaciones)=>{
    setPlan(prev=>{
      const diaNuevo = normalizeDiaPlan(prev[fechaKey], fechaKey);
      diaNuevo[franjaId] = diaNuevo[franjaId].map((item,i)=>
        i===index ? { ...item, raciones: Math.max(1, nuevasRaciones) } : item
      );
      dbPutPlanDia(diaNuevo);
      return { ...prev, [fechaKey]: diaNuevo };
    });
  },[]);

  // Guarda un ajuste de ingredientes (cantidades distintas) SOLO para ese elemento de ese día,
  // sin modificar la receta original. Pasar null en ingredientesOverride para quitar el ajuste.
  const updatePlanItemIngredientes = useCallback(async (fechaKey, franjaId, index, ingredientesOverride)=>{
    setPlan(prev=>{
      const diaNuevo = normalizeDiaPlan(prev[fechaKey], fechaKey);
      diaNuevo[franjaId] = diaNuevo[franjaId].map((item,i)=>{
        if(i!==index) return item;
        if(ingredientesOverride===null){
          const { ingredientesOverride: _omit, ...rest } = item;
          return rest;
        }
        return { ...item, ingredientesOverride };
      });
      dbPutPlanDia(diaNuevo);
      return { ...prev, [fechaKey]: diaNuevo };
    });
  },[]);

  const saveRecipe = async (recipe)=>{
    const toSave = { ...recipe, creadoEn: recipe.creadoEn || Date.now() };
    await dbPut(toSave);
    setRecetas(prev=>{
      const exists = prev.some(r=>r.id===toSave.id);
      const next = exists ? prev.map(r=>r.id===toSave.id?toSave:r) : [toSave, ...prev];
      return next.sort((a,b)=>(b.creadoEn||0)-(a.creadoEn||0));
    });
    showToast(recipe._isNew ? "Receta guardada" : "Cambios guardados");
    setView({screen:"detail", id: toSave.id});
  };

  // Crea un "extra" rápido (ej. un plátano, un yogur) como receta de un solo ingrediente,
  // sin navegar a su detalle, para usarlo directamente desde el calendario.
  const createQuickExtra = useCallback(async (nombre, kcalTotal)=>{
    const id = uid();
    const nuevaReceta = {
      id,
      titulo: nombre.trim(),
      descripcion: "",
      categoria: "snack",
      tiempo: null,
      porciones: 1,
      ingredientes: [{ id: uid(), nombre: nombre.trim(), cantidad:"1", unidad:"ud", kcalTotal: kcalTotal.toString(), kcalMode:"manual", kcal100:"" }],
      pasos: [],
      notas: "",
      destacada: false,
      esExtraRapido: true,
      creadoEn: Date.now(),
    };
    await dbPut(nuevaReceta);
    setRecetas(prev=> [nuevaReceta, ...prev].sort((a,b)=>(b.creadoEn||0)-(a.creadoEn||0)));
    return id;
  },[]);

  const deleteRecipe = async (id)=>{
    await dbDelete(id);
    setRecetas(prev=>prev.filter(r=>r.id!==id));
    showToast("Receta eliminada");
    setView({screen:"list"});
  };

  const filtered = recetas.filter(r=>{
    if(filtro!=="todas" && r.categoria!==filtro) return false;
    if(search.trim()){
      const s = search.toLowerCase();
      const inTitle = r.titulo.toLowerCase().includes(s);
      const inIng = (r.ingredientes||[]).some(i=>i.nombre.toLowerCase().includes(s));
      if(!inTitle && !inIng) return false;
    }
    return true;
  });

  if(!loaded){
    return <div style={{display:'flex',height:'100vh',alignItems:'center',justifyContent:'center',color:'#9b9182'}}>Cargando recetario…</div>;
  }

  return (
    <React.Fragment>
      {tab==="recetario" && (
        <React.Fragment>
          <div className="topbar">
            <div className="brand">
              {filtro!==null && (
                <button className="back-btn" onClick={()=>{ setFiltro(null); setSearch(""); }} aria-label="Volver a categorías">‹</button>
              )}
              <div className="stamp">R</div>
              <h1 className="serif">Mi Recetario</h1>
            </div>
          </div>

          <main>
            <div className="search-wrap">
              <span className="search-icon">⌕</span>
              <input
                placeholder="Buscar receta o ingrediente…"
                value={search}
                onChange={e=>{
                  setSearch(e.target.value);
                  if(e.target.value.trim() && filtro===null) setFiltro("todas");
                }}
              />
            </div>

            {filtro===null ? (
              <React.Fragment>
                <div className="cat-grid">
                  {CATEGORIAS.map(c=>{
                    const count = recetas.filter(r=>r.categoria===c.id).length;
                    return (
                      <div key={c.id} className={"cat-card cat-"+c.id} onClick={()=>setFiltro(c.id)}>
                        <span className="cat-card-icon">
                          {c.icon}{c.iconExtra && <span className="cat-card-icon-extra">{c.iconExtra}</span>}
                        </span>
                        <span className="cat-card-label">{c.label}</span>
                        <span className="cat-card-count">{count} {count===1?'receta':'recetas'}</span>
                      </div>
                    );
                  })}
                </div>
                <button className="ver-todas-btn" onClick={()=>setFiltro("todas")}>Ver todas las recetas</button>
              </React.Fragment>
            ) : (
              <React.Fragment>
                {filtro==="todas" ? (
                  <div className="filters">
                    <button className="chip active" onClick={()=>setFiltro("todas")}>Todas</button>
                    {CATEGORIAS.map(c=>(
                      <button key={c.id} className="chip" onClick={()=>setFiltro(c.id)}>
                        {c.icon} {c.label}
                      </button>
                    ))}
                  </div>
                ) : (
                  <div className="list-category-title">
                    <span className="list-category-icon">{catIcon(filtro)}</span>
                    <h2>{catLabel(filtro)}</h2>
                  </div>
                )}

                {filtered.length===0 ? (
                  <div className="empty">
                    <div className="stamp serif">{filtro!=="todas" ? catIcon(filtro) : "R"}</div>
                    <h3>
                      {recetas.length===0
                        ? "Tu recetario está vacío"
                        : search.trim()
                          ? "No hay coincidencias"
                          : (filtro!=="todas" ? `Sin recetas en ${catLabel(filtro).toLowerCase()}` : "No hay coincidencias")}
                    </h3>
                    <p>
                      {recetas.length===0
                        ? "Toca el botón + para añadir tu primera receta."
                        : search.trim()
                          ? "Prueba con otra búsqueda o categoría."
                          : `Toca el botón + para añadir tu primera receta de ${catLabel(filtro).toLowerCase()}.`}
                    </p>
                  </div>
                ) : (
                  <div className="card-list">
                    {filtered.map(r=>{
                      const servingsBase = r.porciones || 1;
                      const totalKcal = calcTotalKcalBase(r.ingredientes||[]);
                      const kcalPerServing = servingsBase ? Math.round(totalKcal/servingsBase) : 0;
                      return (
                        <div key={r.id} className="recipe-card" onClick={()=>setView({screen:"detail", id:r.id})}>
                          {r.destacada && <span className="tab">Favorita</span>}
                          <div className="stamp-sm">{catIcon(r.categoria)}</div>
                          <div className="info">
                            <h3>{r.titulo}</h3>
                            <div className="meta-row">
                              <span>⏱ {r.tiempo || '—'} min</span>
                              <span>◷ {servingsBase} porc.</span>
                              <span>{catLabel(r.categoria)}</span>
                            </div>
                          </div>
                          {kcalPerServing>0 && <div className="kcal-badge">{kcalPerServing} kcal</div>}
                        </div>
                      );
                    })}
                  </div>
                )}
              </React.Fragment>
            )}
          </main>

          <button className="fab" onClick={()=>setView({screen:"form", id:null, categoriaInicial: (filtro && filtro!=="todas") ? filtro : "comida"})} aria-label="Añadir receta">+</button>
        </React.Fragment>
      )}

      {tab==="calendario" && (
        <CalendarScreen
          recetas={recetas}
          plan={plan}
          alimentosPersonales={alimentosPersonales}
          objetivoKcal={objetivoKcal}
          onAddToSlot={addToPlanSlot}
          onRemoveFromSlot={removeFromPlanSlot}
          onUpdateRaciones={updatePlanSlotRaciones}
          onUpdateIngredientes={updatePlanItemIngredientes}
          onCreateQuickExtra={createQuickExtra}
        />
      )}

      {tab==="estadisticas" && (
        <StatsScreen recetas={recetas} plan={plan} objetivoKcal={objetivoKcal} onUpdateObjetivoKcal={updateObjetivoKcal} />
      )}

      <nav className="bottom-nav">
        <button className={"bottom-nav-item"+(tab==="recetario"?" active":"")} onClick={()=>setTab("recetario")}>
          <span className="bottom-nav-icon">📖</span>
          <span>Recetario</span>
        </button>
        <button className={"bottom-nav-item"+(tab==="calendario"?" active":"")} onClick={()=>setTab("calendario")}>
          <span className="bottom-nav-icon">📅</span>
          <span>Calendario</span>
        </button>
        <button className={"bottom-nav-item"+(tab==="estadisticas"?" active":"")} onClick={()=>setTab("estadisticas")}>
          <span className="bottom-nav-icon">📊</span>
          <span>Estadísticas</span>
        </button>
      </nav>

      {view.screen==="detail" && (
        <DetailScreen
          recipe={recetas.find(r=>r.id===view.id)}
          onClose={()=>setView({screen:"list"})}
          onEdit={(id)=>setView({screen:"form", id})}
          onDelete={deleteRecipe}
        />
      )}

      {view.screen==="form" && (
        <FormScreen
          recipe={view.id ? recetas.find(r=>r.id===view.id) : null}
          categoriaInicial={view.categoriaInicial}
          onClose={()=> view.id ? setView({screen:"detail", id:view.id}) : setView({screen:"list"})}
          onSave={saveRecipe}
          alimentosPersonales={alimentosPersonales}
          onSaveAlimentoPersonal={saveAlimentoPersonal}
        />
      )}

      <div className={"toast"+(toast?" show":"")}>{toast}</div>
    </React.Fragment>
  );
}

// ---------- Detail screen ----------
function DetailScreen({ recipe, onClose, onEdit, onDelete }){
  const baseServings = recipe ? (recipe.porciones||1) : 1;
  const [servings, setServings] = useState(baseServings);

  useEffect(()=>{ setServings(baseServings); }, [recipe && recipe.id]);

  if(!recipe) return null;

  const ingredientes = recipe.ingredientes || [];
  const totalKcalBase = calcTotalKcalBase(ingredientes);
  const totalKcalNow = totalKcalBase * (servings/baseServings);
  const kcalPerServing = Math.round(totalKcalNow/servings) || 0;

  const confirmDelete = ()=>{
    if(window.confirm(`¿Eliminar "${recipe.titulo}"? Esta acción no se puede deshacer.`)){
      onDelete(recipe.id);
    }
  };

  return (
    <div className="screen">
      <div className="screen-top">
        <button className="link-btn" onClick={onClose}>‹ Recetario</button>
        <button className="link-btn" onClick={()=>onEdit(recipe.id)}>Editar</button>
      </div>
      <div className="screen-body">
        <span className="hero-tag">{catIcon(recipe.categoria)} {catLabel(recipe.categoria)}</span>
        <h2 className="hero-title serif">{recipe.titulo}</h2>
        {recipe.descripcion && <p style={{color:'#6b6357', fontSize:15, lineHeight:1.5}}>{recipe.descripcion}</p>}

        <div className="stat-row">
          <div className="stat-box">
            <div className="num">{recipe.tiempo || '—'}</div>
            <div className="lbl">Minutos</div>
          </div>
          <div className="stat-box">
            <div className="num kcal">{kcalPerServing || '—'}</div>
            <div className="lbl">Kcal / porción</div>
          </div>
          <div className="stat-box">
            <div className="num">{Math.round(totalKcalNow) || '—'}</div>
            <div className="lbl">Kcal totales</div>
          </div>
        </div>

        <div className="portion-control">
          <button onClick={()=>setServings(s=>Math.max(1, s-1))}>−</button>
          <div className="portion-num">{servings}<small>porciones</small></div>
          <button onClick={()=>setServings(s=>s+1)}>+</button>
        </div>

        <div className="section-label">Ingredientes</div>
        {ingredientes.length===0 ? (
          <p style={{color:'#9b9182', fontSize:14}}>Sin ingredientes añadidos.</p>
        ) : ingredientes.map((ing,i)=>{
          const scaledQty = scaleQty(ing.cantidad, baseServings, servings);
          const scaledKcal = ing.kcalTotal ? round1(parseFloat(ing.kcalTotal) * (servings/baseServings)) : null;
          return (
            <div className="ingredient-row" key={i}>
              <span className="name">{ing.nombre}</span>
              <span className="qty">
                {fmtQty(scaledQty)} {ing.unidad}
                {scaledKcal!==null && <span className="qty-kcal">{Math.round(scaledKcal)} kcal</span>}
              </span>
            </div>
          );
        })}

        {(recipe.pasos||[]).length>0 && (
          <React.Fragment>
            <div className="section-label">Preparación</div>
            {recipe.pasos.map((p,i)=>(
              <div className="step-row" key={i}>
                <div className="step-num serif">{i+1}</div>
                <div className="step-text">{p}</div>
              </div>
            ))}
          </React.Fragment>
        )}

        {recipe.notas && (
          <React.Fragment>
            <div className="section-label">Notas</div>
            <div className="notes-box">{recipe.notas}</div>
          </React.Fragment>
        )}

        <div style={{marginTop:36, textAlign:'center'}}>
          <button className="link-btn danger" onClick={confirmDelete}>Eliminar receta</button>
        </div>
      </div>
    </div>
  );
}

// ---------- Calendario de planificación ----------
function CalendarScreen({ recetas, plan, alimentosPersonales, objetivoKcal, onAddToSlot, onRemoveFromSlot, onUpdateRaciones, onUpdateIngredientes, onCreateQuickExtra }){
  const today = new Date();
  const todayStart = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  const [cursor, setCursor] = useState(new Date(today.getFullYear(), today.getMonth(), 1));
  const [selectedDay, setSelectedDay] = useState(null); // Date | null

  const recetaById = (id)=> recetas.find(r=>r.id===id);

  // normaliza una franja a array de {recetaId, raciones} (compatibilidad con formatos antiguos: id suelto)
  const franjaList = (dia, franjaId)=>{
    if(!dia) return [];
    const val = dia[franjaId];
    let lista = [];
    if(Array.isArray(val)) lista = val;
    else if(val) lista = [val];
    return lista.map(item => (typeof item === 'string') ? { recetaId: item, raciones: 1 } : item);
  };
  // kcal de un elemento concreto de una franja. Si tiene ingredientesOverride (ajuste manual
  // de cantidades para ese día), se calculan las kcal directamente de esos ingredientes y no
  // se multiplica por raciones (el ajuste ya representa la cantidad real consumida esa vez).
  const kcalDeItem = (item)=>{
    const receta = recetaById(item.recetaId);
    if(!receta) return 0;
    if(item.ingredientesOverride){
      return calcTotalKcalBase(item.ingredientesOverride);
    }
    return kcalPorPorcion(receta) * (item.raciones || 1);
  };

  // kcal totales planificadas para un día (suma de todos los elementos de las 4 franjas)
  const kcalDelDia = (fechaKey)=>{
    const dia = plan[fechaKey];
    if(!dia) return 0;
    return FRANJAS.reduce((sum,f)=>{
      const items = franjaList(dia, f.id);
      return sum + items.reduce((s,item)=> s + kcalDeItem(item), 0);
    }, 0);
  };
  const elementosDelDia = (fechaKey)=>{
    const dia = plan[fechaKey];
    if(!dia) return 0;
    return FRANJAS.reduce((sum,f)=> sum + franjaList(dia,f.id).length, 0);
  };

  // color según el objetivo de kcal: "verde" (<=objetivo), "ambar" (hasta +5%), "rojo" (más allá)
  // null si no hay objetivo definido o el día no tiene nada planificado
  const colorObjetivo = (fechaKey)=>{
    if(!objetivoKcal || elementosDelDia(fechaKey)===0) return null;
    const kcal = kcalDelDia(fechaKey);
    if(kcal <= objetivoKcal) return "verde";
    if(kcal <= objetivoKcal*1.05) return "ambar";
    return "rojo";
  };

  // --- construir cuadrícula del mes (lunes a domingo), agrupada en semanas ---
  const year = cursor.getFullYear();
  const month = cursor.getMonth();
  const firstOfMonth = new Date(year, month, 1);
  const startWeekday = (firstOfMonth.getDay()+6)%7; // 0=lunes
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const gridDays = [];
  for(let i=0;i<startWeekday;i++){
    const d = new Date(year, month, 1-(startWeekday-i));
    gridDays.push({ date:d, otherMonth:true });
  }
  for(let d=1; d<=daysInMonth; d++){
    gridDays.push({ date:new Date(year,month,d), otherMonth:false });
  }
  while(gridDays.length % 7 !== 0){
    const last = gridDays[gridDays.length-1].date;
    const d = new Date(last);
    d.setDate(d.getDate()+1);
    gridDays.push({ date:d, otherMonth:true });
  }

  // --- promedio mensual (mes en curso real, no el navegado) ---
  const calcPromedio = (fechas)=>{
    const dias = fechas.filter(key => elementosDelDia(key)>0);
    if(dias.length===0) return 0;
    const total = dias.reduce((sum,key)=> sum + kcalDelDia(key), 0);
    return Math.round(total/dias.length);
  };
  const diasEnMesActual = new Date(today.getFullYear(), today.getMonth()+1, 0).getDate();
  const mesKeys = Array.from({length:diasEnMesActual}, (_,i)=> fechaToKey(new Date(today.getFullYear(), today.getMonth(), i+1)));
  const promedioMensual = calcPromedio(mesKeys);

  return (
    <React.Fragment>
      <div className="topbar">
        <div className="brand">
          <div className="stamp">📅</div>
          <h1 className="serif">Planificador</h1>
        </div>
      </div>

      <div className="cal-main">
        <div className="cal-header">
          <button className="cal-nav-btn" onClick={()=>setCursor(new Date(year, month-1, 1))} aria-label="Mes anterior">‹</button>
          <h2 className="serif">{MESES[month]} {year}</h2>
          <button className="cal-nav-btn" onClick={()=>setCursor(new Date(year, month+1, 1))} aria-label="Mes siguiente">›</button>
        </div>
        <button className="cal-today-btn" onClick={()=>setCursor(new Date(today.getFullYear(), today.getMonth(), 1))}>Ir a hoy</button>

        <div className="cal-summary-row">
          <div className="cal-summary-box">
            <div className="num">{promedioMensual || '—'}</div>
            <div className="lbl">Media diaria del mes</div>
          </div>
        </div>

        <div className="cal-weekdays">
          {DIAS_SEMANA.map(d=> <span key={d}>{d}</span>)}
        </div>
        <div className="cal-grid">
          {gridDays.map((gd,idx)=>{
            const key = fechaToKey(gd.date);
            const kcal = Math.round(kcalDelDia(key));
            const numElementos = elementosDelDia(key);
            const isToday = isSameDay(gd.date, today);
            const isPast = gd.date < todayStart && !isToday;
            const colorObj = colorObjetivo(key);
            return (
              <div
                key={idx}
                className={"cal-day"+(gd.otherMonth?" other-month":"")+(isPast?" past":"")+(colorObj?" obj-"+colorObj:"")}
                onClick={()=>setSelectedDay(gd.date)}
              >
                {isToday && <span className="today-mark" aria-label="Hoy"></span>}
                <span className="daynum">{gd.date.getDate()}</span>
                {kcal>0 && <span className="daykcal">{kcal}</span>}
                {numElementos>0 && (
                  <div className="daydots">
                    {Array.from({length:Math.min(numElementos,4)}).map((_,i)=><span key={i} className="daydot"></span>)}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>

      {selectedDay && (
        <DayPanel
          date={selectedDay}
          plan={plan[fechaToKey(selectedDay)]}
          recetaById={recetaById}
          recetas={recetas}
          alimentosPersonales={alimentosPersonales}
          franjaList={franjaList}
          kcalDeItem={kcalDeItem}
          onClose={()=>setSelectedDay(null)}
          onAdd={(franjaId, recetaId)=> onAddToSlot(fechaToKey(selectedDay), franjaId, recetaId)}
          onRemove={(franjaId, index)=> onRemoveFromSlot(fechaToKey(selectedDay), franjaId, index)}
          onUpdateRaciones={(franjaId, index, raciones)=> onUpdateRaciones(fechaToKey(selectedDay), franjaId, index, raciones)}
          onUpdateIngredientes={(franjaId, index, ingredientesOverride)=> onUpdateIngredientes(fechaToKey(selectedDay), franjaId, index, ingredientesOverride)}
          onCreateQuickExtra={onCreateQuickExtra}
        />
      )}
    </React.Fragment>
  );
}

function DayPanel({ date, plan, recetaById, recetas, alimentosPersonales, franjaList, kcalDeItem, onClose, onAdd, onRemove, onUpdateRaciones, onUpdateIngredientes, onCreateQuickExtra }){
  const [pickerFor, setPickerFor] = useState(null); // franjaId | null
  const [editingItem, setEditingItem] = useState(null); // { franjaId, index, item, receta } | null

  const dia = plan || {};
  const total = FRANJAS.reduce((sum,f)=>{
    const items = franjaList(dia, f.id);
    return sum + items.reduce((s,item)=> s + kcalDeItem(item), 0);
  }, 0);

  const fechaLabel = date.toLocaleDateString('es-ES', { weekday:'long', day:'numeric', month:'long' });

  return (
    <div className="day-panel-overlay" onClick={onClose}>
      <div className="day-panel" onClick={e=>e.stopPropagation()}>
        <div className="day-panel-handle"></div>
        <h3 className="serif">{fechaLabel}</h3>
        <div className="day-total">{total>0 ? `${Math.round(total)} kcal planificadas` : 'Sin recetas planificadas'}</div>

        {FRANJAS.map(f=>{
          const items = franjaList(dia, f.id);
          return (
            <div className="franja-block" key={f.id}>
              <div className="franja-label">{f.icon} {f.label}</div>
              {items.map((item, idx)=>{
                const receta = recetaById(item.recetaId);
                if(!receta) return null;
                const raciones = item.raciones || 1;
                const kcalItem = Math.round(kcalDeItem(item));
                const ajustado = !!item.ingredientesOverride;
                const tieneIngredientes = (receta.ingredientes||[]).length>0;
                return (
                  <div className="franja-slot raciones-slot" key={idx} style={{marginBottom:6}}>
                    <div className="slot-top-line">
                      <span className="slot-recipe-name">
                        {receta.titulo}
                        {ajustado && <span className="ajustado-badge">Ajustado hoy</span>}
                      </span>
                      <div className="slot-top-actions">
                        {tieneIngredientes && (
                          <button
                            className="slot-edit"
                            onClick={()=>setEditingItem({ franjaId:f.id, index:idx, item, receta })}
                            aria-label="Editar cantidades para este día"
                          >✎</button>
                        )}
                        <button className="slot-remove" onClick={()=>onRemove(f.id, idx)} aria-label="Quitar">×</button>
                      </div>
                    </div>
                    <div className="slot-bottom-line">
                      {ajustado ? (
                        <button className="link-btn" style={{fontSize:12.5, padding:'2px 0'}} onClick={()=>onUpdateIngredientes(f.id, idx, null)}>
                          Quitar ajuste
                        </button>
                      ) : (
                        <div className="raciones-control">
                          <button onClick={()=>onUpdateRaciones(f.id, idx, raciones-1)} disabled={raciones<=1} aria-label="Menos raciones">−</button>
                          <span className="raciones-num">{raciones} {raciones===1 ? 'ración' : 'raciones'}</span>
                          <button onClick={()=>onUpdateRaciones(f.id, idx, raciones+1)} aria-label="Más raciones">+</button>
                        </div>
                      )}
                      <span className="slot-kcal">{kcalItem} kcal</span>
                    </div>
                  </div>
                );
              })}
              <div className="franja-slot empty" onClick={()=>setPickerFor(f.id)}>
                + Añadir {items.length>0 ? 'otro' : ''}
              </div>
            </div>
          );
        })}
      </div>

      {pickerFor && (
        <RecipePicker
          recetas={recetas}
          alimentosPersonales={alimentosPersonales}
          franjaLabel={FRANJAS.find(f=>f.id===pickerFor).label}
          onSelect={(recetaId)=>{ onAdd(pickerFor, recetaId); setPickerFor(null); }}
          onCreateQuickExtra={async (nombre, kcal)=>{
            const newId = await onCreateQuickExtra(nombre, kcal);
            onAdd(pickerFor, newId);
            setPickerFor(null);
          }}
          onClose={()=>setPickerFor(null)}
        />
      )}

      {editingItem && (
        <EditPlanItemForm
          receta={editingItem.receta}
          item={editingItem.item}
          onSave={(ingredientesAjustados)=>{
            onUpdateIngredientes(editingItem.franjaId, editingItem.index, ingredientesAjustados);
            setEditingItem(null);
          }}
          onClose={()=>setEditingItem(null)}
        />
      )}
    </div>
  );
}

function RecipePicker({ recetas, alimentosPersonales, franjaLabel, onSelect, onCreateQuickExtra, onClose }){
  const [search, setSearch] = useState("");
  const [showExtraForm, setShowExtraForm] = useState(false);
  const [extraNombre, setExtraNombre] = useState("");
  const [extraSuggestions, setExtraSuggestions] = useState([]);
  const [extraSuggestOpen, setExtraSuggestOpen] = useState(false);
  // matched: alimento encontrado en la tabla {kcal100, pesoUnidad} | null si modo 100% manual
  const [matched, setMatched] = useState(null);
  const [extraPeso, setExtraPeso] = useState(""); // gramos, usado cuando matched existe
  const [extraKcalManual, setExtraKcalManual] = useState(""); // kcal totales, usado cuando NO hay match

  const filtered = recetas.filter(r=> r.titulo.toLowerCase().includes(search.toLowerCase()));

  const handleNombreChange = (val)=>{
    setExtraNombre(val);
    setMatched(null);
    const matches = suggestFoods(val, alimentosPersonales, 5);
    setExtraSuggestions(matches);
    setExtraSuggestOpen(matches.length>0);
  };

  const handleSelectSuggestion = (s)=>{
    setExtraNombre(s.nombre);
    setMatched(s);
    setExtraPeso(s.pesoUnidad ? s.pesoUnidad.toString() : "100");
    setExtraSuggestOpen(false);
  };

  const kcalCalculadas = matched ? Math.round((matched.kcal100/100) * (parseFloat(extraPeso)||0)) : null;
  const kcalFinal = matched ? kcalCalculadas : parseFloat(extraKcalManual);
  const canCreateExtra = extraNombre.trim() && !isNaN(kcalFinal) && kcalFinal>0;

  const handleCreateExtra = ()=>{
    if(!canCreateExtra) return;
    onCreateQuickExtra(extraNombre.trim(), kcalFinal);
  };

  return (
    <div className="recipe-picker-overlay" onClick={onClose}>
      <div className="recipe-picker" onClick={e=>e.stopPropagation()}>
        <h3>Añadir a {franjaLabel.toLowerCase()}</h3>

        {!showExtraForm ? (
          <React.Fragment>
            <div className="search-wrap" style={{marginBottom:14}}>
              <span className="search-icon">⌕</span>
              <input placeholder="Buscar receta…" value={search} onChange={e=>setSearch(e.target.value)} autoFocus />
            </div>
            <button className="quick-extra-btn" onClick={()=>setShowExtraForm(true)}>
              + Añadir algo suelto (plátano, yogur…)
            </button>
            {filtered.length===0 ? (
              <div className="recipe-picker-empty">
                {recetas.length===0 ? "Aún no tienes recetas guardadas." : "No hay recetas que coincidan."}
              </div>
            ) : filtered.map(r=>(
              <div className="recipe-picker-item" key={r.id} onClick={()=>onSelect(r.id)}>
                <div className="stamp-sm">{catIcon(r.categoria)}</div>
                <span className="name">{r.titulo}</span>
                <span className="kcal">{Math.round(kcalPorPorcion(r))} kcal</span>
              </div>
            ))}
          </React.Fragment>
        ) : (
          <div className="quick-extra-form">
            <div className="field" style={{position:'relative'}}>
              <label>Nombre</label>
              <input
                placeholder="Ej. Plátano, yogur natural…"
                value={extraNombre}
                autoComplete="off"
                onChange={e=>handleNombreChange(e.target.value)}
                onFocus={()=>{ if(extraSuggestions.length>0) setExtraSuggestOpen(true); }}
                onBlur={()=> setTimeout(()=>setExtraSuggestOpen(false), 150)}
                autoFocus
              />
              {extraSuggestOpen && (
                <div className="suggest-dropdown">
                  {extraSuggestions.map((s,idx)=>(
                    <div key={idx} className="suggest-item" onMouseDown={()=>handleSelectSuggestion(s)}>
                      <span className="suggest-name">{s.nombre}</span>
                      <span className="suggest-kcal">{s.kcal100} kcal/100{s.origen==="personal" ? " · tu tabla" : ""}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {matched ? (
              <React.Fragment>
                <div className="field">
                  <label>Peso (g)</label>
                  <input
                    type="number" min="0" step="any"
                    value={extraPeso}
                    onChange={e=>setExtraPeso(e.target.value)}
                  />
                  {matched.pesoUnidad && (
                    <p className="quick-extra-hint" style={{marginTop:6}}>
                      Peso orientativo de una unidad mediana ({matched.pesoUnidad}g) — ajústalo si la tuya es más grande o pequeña.
                    </p>
                  )}
                </div>
                <div className="edit-total-row" style={{marginTop:0}}>
                  <span>Total estimado</span>
                  <span className="edit-total-kcal">{kcalCalculadas || 0} kcal</span>
                </div>
              </React.Fragment>
            ) : (
              <div className="field">
                <label>Kcal totales</label>
                <input placeholder="Ej. 95" type="number" min="0" step="any" value={extraKcalManual} onChange={e=>setExtraKcalManual(e.target.value)} />
                {extraNombre.trim().length>=2 && (
                  <p className="quick-extra-hint" style={{marginTop:6}}>
                    No está en la tabla — escribe las kcal totales a mano.
                  </p>
                )}
              </div>
            )}

            <p className="quick-extra-hint">Se guardará en tu recetario para poder reutilizarlo otro día.</p>
            <div style={{display:'flex', gap:10}}>
              <button className="link-btn" onClick={()=>setShowExtraForm(false)} style={{flex:1}}>Cancelar</button>
              <button
                className="quick-extra-confirm"
                disabled={!canCreateExtra}
                onClick={handleCreateExtra}
              >
                Añadir
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ---------- Ajuste de cantidades de una receta SOLO para un día/franja concreto ----------
function EditPlanItemForm({ receta, item, onSave, onClose }){
  // parte del override ya guardado si existe, o de los ingredientes originales de la receta
  const base = item.ingredientesOverride || receta.ingredientes || [];
  const [ingredientes, setIngredientes] = useState(
    base.map(i=> ({ ...i, id: i.id || uid() }))
  );

  const updateCantidad = (id, nuevaCantidad)=>{
    setIngredientes(prev=> prev.map(ing=>{
      if(ing.id!==id) return ing;
      const kcalTotal = calcKcalTotalFromBase(ing.kcal100, nuevaCantidad, ing.unidad);
      return { ...ing, cantidad: nuevaCantidad, kcalTotal: ing.kcal100 ? kcalTotal : ing.kcalTotal };
    }));
  };

  const totalKcal = Math.round(calcTotalKcalBase(ingredientes));
  const totalKcalOriginal = Math.round(calcTotalKcalBase(receta.ingredientes||[]));

  const handleGuardar = ()=> onSave(ingredientes);
  const handleRestaurar = ()=>{
    setIngredientes((receta.ingredientes||[]).map(i=> ({ ...i, id: i.id || uid() })));
  };

  return (
    <div className="recipe-picker-overlay" onClick={onClose}>
      <div className="recipe-picker edit-plan-item" onClick={e=>e.stopPropagation()}>
        <h3>Ajustar para hoy: {receta.titulo}</h3>
        <p className="quick-extra-hint" style={{marginTop:-6}}>
          Cambia las cantidades que realmente usaste. Solo afecta a esta entrada de hoy,
          la receta guardada en tu recetario no se modifica.
        </p>

        {ingredientes.map(ing=>(
          <div className="edit-ing-row" key={ing.id}>
            <span className="edit-ing-name">{ing.nombre}</span>
            <input
              type="number" min="0" step="any"
              value={ing.cantidad}
              onChange={e=>updateCantidad(ing.id, e.target.value)}
            />
            <span className="edit-ing-unidad">{ing.unidad}</span>
          </div>
        ))}

        <div className="edit-total-row">
          <span>Total ajustado</span>
          <span className="edit-total-kcal">{totalKcal} kcal</span>
        </div>
        {totalKcal !== totalKcalOriginal && (
          <p className="quick-extra-hint" style={{marginTop:4}}>
            Receta original: {totalKcalOriginal} kcal totales
          </p>
        )}

        <div style={{display:'flex', gap:10, marginTop:16}}>
          <button className="link-btn" onClick={handleRestaurar} style={{flex:1}}>Restaurar original</button>
          <button className="quick-extra-confirm" onClick={handleGuardar}>Guardar para hoy</button>
        </div>
      </div>
    </div>
  );
}

// ---------- Estadísticas ----------
function StatsScreen({ recetas, plan, objetivoKcal, onUpdateObjetivoKcal }){
  const today = new Date();
  const todayKey = fechaToKey(today);
  const recetaById = (id)=> recetas.find(r=>r.id===id);
  const [objetivoInput, setObjetivoInput] = useState(objetivoKcal ? objetivoKcal.toString() : "");
  const [editingObjetivo, setEditingObjetivo] = useState(!objetivoKcal);
  const [franjasPage, setFranjasPage] = useState(0);
  const franjasPagerRef = useRef(null);
  const handleFranjasPagerScroll = ()=>{
    const el = franjasPagerRef.current;
    if(!el) return;
    const page = Math.round(el.scrollLeft / el.clientWidth);
    setFranjasPage(page);
  };

  const franjaList = (dia, franjaId)=>{
    if(!dia) return [];
    const val = dia[franjaId];
    let lista = [];
    if(Array.isArray(val)) lista = val;
    else if(val) lista = [val];
    return lista.map(item => (typeof item === 'string') ? { recetaId: item, raciones: 1 } : item);
  };
  const kcalDeItem = (item)=>{
    const receta = recetaById(item.recetaId);
    if(!receta) return 0;
    if(item.ingredientesOverride){
      return calcTotalKcalBase(item.ingredientesOverride);
    }
    return kcalPorPorcion(receta) * (item.raciones || 1);
  };

  const kcalDelDia = (fechaKey)=>{
    const dia = plan[fechaKey];
    if(!dia) return 0;
    return FRANJAS.reduce((sum,f)=>{
      const items = franjaList(dia, f.id);
      return sum + items.reduce((s,item)=> s + kcalDeItem(item), 0);
    }, 0);
  };
  const elementosDelDia = (fechaKey)=>{
    const dia = plan[fechaKey];
    if(!dia) return 0;
    return FRANJAS.reduce((sum,f)=> sum + franjaList(dia,f.id).length, 0);
  };
  const calcPromedio = (fechas)=>{
    const dias = fechas.filter(key => elementosDelDia(key)>0);
    if(dias.length===0) return 0;
    const total = dias.reduce((sum,key)=> sum + kcalDelDia(key), 0);
    return Math.round(total/dias.length);
  };

  const kcalHoy = Math.round(kcalDelDia(todayKey));
  const colorObjetivoHoy = (()=>{
    if(!objetivoKcal || elementosDelDia(todayKey)===0) return null;
    if(kcalHoy <= objetivoKcal) return "verde";
    if(kcalHoy <= objetivoKcal*1.05) return "ambar";
    return "rojo";
  })();

  const startOfWeek = new Date(today);
  startOfWeek.setDate(today.getDate() - ((today.getDay()+6)%7));
  const semanaKeys = Array.from({length:7}, (_,i)=>{
    const d = new Date(startOfWeek); d.setDate(startOfWeek.getDate()+i);
    return fechaToKey(d);
  });
  const promedioSemanal = calcPromedio(semanaKeys);

  const diasEnMesActual = new Date(today.getFullYear(), today.getMonth()+1, 0).getDate();
  const mesKeys = Array.from({length:diasEnMesActual}, (_,i)=> fechaToKey(new Date(today.getFullYear(), today.getMonth(), i+1)));
  const promedioMensual = calcPromedio(mesKeys);

  // --- kcal de HOY por franja (para la página 1 del carrusel) ---
  const kcalPorFranjaEnDia = (dia, franjaId)=>{
    return franjaList(dia, franjaId).reduce((sum,item)=> sum + kcalDeItem(item), 0);
  };
  const diaHoy = plan[todayKey];
  const kcalHoyPorFranja = FRANJAS.map(f=>({
    ...f,
    valor: diaHoy ? Math.round(kcalPorFranjaEnDia(diaHoy, f.id)) : 0,
  }));

  // --- media de kcal por franja del MES ACTUAL (para la página 2 del carrusel) ---
  const mediasPorFranja = FRANJAS.map(f=>{
    const diasConDatosMes = mesKeys.filter(key => franjaList(plan[key], f.id).length>0);
    if(diasConDatosMes.length===0) return { ...f, valor:0 };
    const total = diasConDatosMes.reduce((sum,key)=> sum + kcalPorFranjaEnDia(plan[key], f.id), 0);
    return { ...f, valor: Math.round(total/diasConDatosMes.length) };
  });

  // --- % de días en verde / ámbar / rojo respecto al objetivo, sobre todo el historial planificado ---
  const diasConPlan = Object.keys(plan).filter(key => elementosDelDia(key)>0);
  let resumenObjetivo = null;
  if(objetivoKcal && diasConPlan.length>0){
    let verde=0, ambar=0, rojo=0;
    diasConPlan.forEach(key=>{
      const kcal = kcalDelDia(key);
      if(kcal <= objetivoKcal) verde++;
      else if(kcal <= objetivoKcal*1.05) ambar++;
      else rojo++;
    });
    const total = diasConPlan.length;
    resumenObjetivo = {
      verde: Math.round((verde/total)*100),
      ambar: Math.round((ambar/total)*100),
      rojo: Math.round((rojo/total)*100),
      totalDias: total,
    };
  }

  const handleGuardarObjetivo = ()=>{
    const val = parseInt(objetivoInput);
    if(!isNaN(val) && val>0){
      onUpdateObjetivoKcal(val);
      setEditingObjetivo(false);
    }
  };

  return (
    <React.Fragment>
      <div className="topbar">
        <div className="brand">
          <div className="stamp">📊</div>
          <h1 className="serif">Estadísticas</h1>
        </div>
      </div>

      <main>
        <div className="section-label" style={{marginTop:0}}>Objetivo diario</div>
        {editingObjetivo ? (
          <div className="objetivo-edit-row">
            <input
              type="number" min="1" placeholder="Ej. 2000"
              value={objetivoInput}
              onChange={e=>setObjetivoInput(e.target.value)}
              autoFocus
            />
            <span className="objetivo-unit">kcal/día</span>
            <button className="objetivo-save-btn" disabled={!objetivoInput || isNaN(parseInt(objetivoInput))} onClick={handleGuardarObjetivo}>Guardar</button>
          </div>
        ) : (
          <div className="objetivo-display-row">
            <span className="objetivo-display-num">{objetivoKcal} kcal/día</span>
            <button className="link-btn" onClick={()=>{ setObjetivoInput(objetivoKcal.toString()); setEditingObjetivo(true); }}>Editar</button>
          </div>
        )}

        <div className="section-label">Calorías planificadas</div>
        <div className="stats-row">
          <div className={"stats-box"+(colorObjetivoHoy?" obj-"+colorObjetivoHoy:"")}>
            <div className="stats-num">{kcalHoy || '—'}</div>
            <div className="stats-lbl">Hoy</div>
          </div>
          <div className="stats-box">
            <div className="stats-num">{promedioSemanal || '—'}</div>
            <div className="stats-lbl">Media / día<br/>esta semana</div>
          </div>
          <div className="stats-box">
            <div className="stats-num">{promedioMensual || '—'}</div>
            <div className="stats-lbl">Media / día<br/>este mes</div>
          </div>
        </div>

        <div className="section-label">{franjasPage===0 ? "Hoy por franja" : "Media del mes por franja"}</div>
        <div className="franjas-pager" ref={franjasPagerRef} onScroll={handleFranjasPagerScroll}>
          <div className="franjas-page">
            <div className="franja-stats-list">
              {kcalHoyPorFranja.map(f=>{
                const maxValor = Math.max(1, ...kcalHoyPorFranja.map(x=>x.valor||1));
                return (
                  <div className="franja-stats-item" key={f.id}>
                    <span className="franja-stats-icon">{f.icon}</span>
                    <span className="franja-stats-label">{f.label}</span>
                    <div className="franja-stats-bar-wrap">
                      <div className="franja-stats-bar" style={{width: (f.valor>0 ? Math.min(100, (f.valor/maxValor)*100) : 0)+'%'}}></div>
                    </div>
                    <span className="franja-stats-num">{f.valor>0 ? `${f.valor} kcal` : '—'}</span>
                  </div>
                );
              })}
            </div>
          </div>
          <div className="franjas-page">
            <div className="franja-stats-list">
              {mediasPorFranja.map(f=>{
                const maxValor = Math.max(1, ...mediasPorFranja.map(x=>x.valor||1));
                return (
                  <div className="franja-stats-item" key={f.id}>
                    <span className="franja-stats-icon">{f.icon}</span>
                    <span className="franja-stats-label">{f.label}</span>
                    <div className="franja-stats-bar-wrap">
                      <div className="franja-stats-bar" style={{width: (f.valor>0 ? Math.min(100, (f.valor/maxValor)*100) : 0)+'%'}}></div>
                    </div>
                    <span className="franja-stats-num">{f.valor>0 ? `${f.valor} kcal` : '—'}</span>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
        <div className="franjas-pager-dots">
          <span className={"franjas-dot"+(franjasPage===0?" active":"")}></span>
          <span className={"franjas-dot"+(franjasPage===1?" active":"")}></span>
        </div>

        {resumenObjetivo && (
          <React.Fragment>
            <div className="section-label">Cumplimiento del objetivo</div>
            <p className="quick-extra-hint" style={{marginTop:-8, marginBottom:14}}>
              Sobre {resumenObjetivo.totalDias} {resumenObjetivo.totalDias===1?'día':'días'} planificados.
            </p>
            <div className="objetivo-pct-row">
              <div className="objetivo-pct-box objetivo-pct-verde">
                <div className="objetivo-pct-num">{resumenObjetivo.verde}%</div>
                <div className="objetivo-pct-lbl">Dentro del objetivo</div>
              </div>
              <div className="objetivo-pct-box objetivo-pct-ambar">
                <div className="objetivo-pct-num">{resumenObjetivo.ambar}%</div>
                <div className="objetivo-pct-lbl">Hasta +5%</div>
              </div>
              <div className="objetivo-pct-box objetivo-pct-rojo">
                <div className="objetivo-pct-num">{resumenObjetivo.rojo}%</div>
                <div className="objetivo-pct-lbl">Por encima</div>
              </div>
            </div>
          </React.Fragment>
        )}
      </main>
    </React.Fragment>
  );
}

// ---------- Form screen (create/edit) ----------
function emptyIngredient(){
  return { id: uid(), nombre:"", cantidad:"", unidad:"g", kcalTotal:"", kcalMode:"", kcal100:"" };
}
// recalcula kcalTotal a partir de kcal100, cantidad y unidad (regla de tres simple)
function calcKcalTotalFromBase(kcal100, cantidad, unidad){
  const base = parseFloat(kcal100);
  const qty = parseFloat(cantidad);
  if(isNaN(base) || isNaN(qty) || qty<=0) return "";
  if(!UNIDADES_PROPORCIONALES.includes(unidad)) return ""; // no convertible por 100, ver kcal directa
  const factor = (unidad==="kg" || unidad==="l") ? 1000 : 1; // kg/l equivalen a 1000 veces la base de 100g/100ml
  return round1((base/100) * qty * factor).toString();
}

function FormScreen({ recipe, categoriaInicial, onClose, onSave, alimentosPersonales, onSaveAlimentoPersonal }){
  const isEdit = !!recipe;
  const [titulo, setTitulo] = useState(recipe? recipe.titulo : "");
  const [descripcion, setDescripcion] = useState(recipe? (recipe.descripcion||"") : "");
  const [categoria, setCategoria] = useState(recipe? recipe.categoria : (categoriaInicial || "comida"));
  const [tiempo, setTiempo] = useState(recipe? (recipe.tiempo||"") : "");
  const [porciones, setPorciones] = useState(recipe? (recipe.porciones||"") : "");
  const [ingredientes, setIngredientes] = useState(
    recipe && recipe.ingredientes && recipe.ingredientes.length
      ? recipe.ingredientes.map(i=>({
          ...i,
          id: i.id||uid(),
          lookupStatus: i.kcal100 ? "found" : ""
        }))
      : [emptyIngredient()]
  );
  const [pasos, setPasos] = useState(recipe && recipe.pasos && recipe.pasos.length ? [...recipe.pasos] : [""]);
  const [notas, setNotas] = useState(recipe? (recipe.notas||"") : "");
  const [destacada, setDestacada] = useState(recipe? !!recipe.destacada : false);
  const [suggestOpenFor, setSuggestOpenFor] = useState(null); // id del ingrediente con sugerencias abiertas
  const [suggestions, setSuggestions] = useState([]);
  const [manualKcalOpenFor, setManualKcalOpenFor] = useState({}); // { [ingId]: true } — campo manual revelado

  const porcionesValidas = parseInt(porciones)>=1;
  const canSave = titulo.trim().length>0 && porcionesValidas;

  const [justAddedId, setJustAddedId] = useState(null);

  const updateIngredient = (id, patch)=>{
    setIngredientes(prev=>prev.map(ing=> ing.id===id ? {...ing, ...patch} : ing));
  };
  const removeIngredient = (id)=>{
    setIngredientes(prev=>{
      const next = prev.filter(ing=>ing.id!==id);
      return next.length>0 ? next : [emptyIngredient()];
    });
  };
  const addIngredient = ()=>{
    const nuevo = emptyIngredient();
    setIngredientes(prev=>[...prev, nuevo]);
    setJustAddedId(nuevo.id);
    setTimeout(()=>setJustAddedId(prev=> prev===nuevo.id ? null : prev), 1500);
  };
  const ingredientesConKcal = ingredientes.filter(i=>i.kcalTotal).length;

  const updatePaso = (i, val)=> setPasos(prev=> prev.map((p,idx)=> idx===i? val : p));
  const removePaso = (i)=> setPasos(prev=> prev.length>1 ? prev.filter((_,idx)=>idx!==i) : prev);
  const addPaso = ()=> setPasos(prev=>[...prev, ""]);

  // búsqueda automática: siempre intenta encontrar el alimento en tabla personal + tabla local
  const debounceRefs = useRef({});
  const triggerLookup = (ing)=>{
    clearTimeout(debounceRefs.current[ing.id]);
    debounceRefs.current[ing.id] = setTimeout(async ()=>{
      if(!ing.nombre || ing.nombre.trim().length<2){
        updateIngredient(ing.id, { lookupStatus:"" });
        return;
      }
      updateIngredient(ing.id, { lookupStatus:"searching" });
      const result = await lookupKcalPer100g(ing.nombre, alimentosPersonales);
      if(!result){
        updateIngredient(ing.id, { lookupStatus:"none" });
        return;
      }
      const kcalTotal = calcKcalTotalFromBase(result.kcal100, ing.cantidad, ing.unidad);
      updateIngredient(ing.id, { lookupStatus:"found", kcalMode:"auto", kcal100: result.kcal100.toString(), kcalTotal, origen: result.origen });
    }, 250);
  };

  // recalcula kcalTotal cuando cambia cantidad o unidad, a partir del kcal100 ya fijado (manual o auto)
  const recalcKcalTotal = (ing, newQty, newUnidad)=>{
    if(!ing.kcal100) return ing.kcalTotal;
    return calcKcalTotalFromBase(ing.kcal100, newQty, newUnidad);
  };

  // cuando el usuario teclea kcal100 a mano (tras no encontrar coincidencia)
  const handleManualKcal100Change = (ing, newKcal100)=>{
    const kcalTotal = calcKcalTotalFromBase(newKcal100, ing.cantidad, ing.unidad);
    updateIngredient(ing.id, { kcal100: newKcal100, kcalTotal, kcalMode:"manual" });
  };

  // para unidades no proporcionales (ud, taza, cda...): el usuario escribe directamente las kcal totales
  const handleManualKcalDirectaChange = (ing, newKcalTotal)=>{
    updateIngredient(ing.id, { kcalTotal: newKcalTotal, kcal100:"", kcalMode:"manual" });
  };

  // al salir del campo de kcal100 manual, guarda el alimento en la tabla personal para no repetirlo
  // (solo si es una unidad proporcional, ya que ahí sí existe un valor real de "por 100g/ml")
  const handleManualKcal100Blur = (ing)=>{
    if(UNIDADES_PROPORCIONALES.includes(ing.unidad) && ing.nombre.trim() && ing.kcal100 && !isNaN(parseFloat(ing.kcal100))){
      onSaveAlimentoPersonal(ing.nombre.trim(), ing.kcal100);
    }
  };

  // mientras se escribe el nombre, muestra sugerencias y dispara la búsqueda automática
  const handleNombreChange = (ing, newNombre)=>{
    updateIngredient(ing.id, {nombre:newNombre});
    triggerLookup({...ing, nombre:newNombre});
    const matches = suggestFoods(newNombre, alimentosPersonales, 5);
    setSuggestions(matches);
    setSuggestOpenFor(matches.length>0 ? ing.id : null);
  };

  // al elegir una sugerencia, se rellena nombre + kcal100 y se recalcula el total
  const handleSelectSuggestion = (ing, sugerencia)=>{
    const kcalTotal = calcKcalTotalFromBase(sugerencia.kcal100, ing.cantidad, ing.unidad);
    updateIngredient(ing.id, {
      nombre: sugerencia.nombre,
      kcal100: sugerencia.kcal100.toString(),
      kcalTotal,
      kcalMode:"auto",
      lookupStatus: "found",
      origen: sugerencia.origen,
    });
    setSuggestOpenFor(null);
    setSuggestions([]);
  };

  const handleSave = ()=>{
    if(!canSave) return;
    // por si algún campo manual no perdió el foco antes de guardar, aseguramos guardar igualmente
    ingredientes.forEach(ing=>{
      if(ing.kcalMode==="manual" && ing.nombre.trim() && ing.kcal100 && !isNaN(parseFloat(ing.kcal100))){
        onSaveAlimentoPersonal(ing.nombre.trim(), ing.kcal100);
      }
    });
    const cleanIngredientes = ingredientes
      .filter(i=>i.nombre.trim())
      .map(({lookupStatus, ...rest})=>rest);
    const cleanPasos = pasos.filter(p=>p.trim());
    onSave({
      id: recipe ? recipe.id : uid(),
      titulo: titulo.trim(),
      descripcion: descripcion.trim(),
      categoria,
      tiempo: tiempo? parseInt(tiempo) : null,
      porciones: parseInt(porciones)||1,
      ingredientes: cleanIngredientes,
      pasos: cleanPasos,
      notas: notas.trim(),
      destacada,
      creadoEn: recipe ? recipe.creadoEn : Date.now(),
      _isNew: !recipe,
    });
  };

  return (
    <div className="screen">
      <div className="screen-top">
        <button className="link-btn" onClick={onClose}>Cancelar</button>
        <div className="title">{isEdit ? "Editar receta" : "Nueva receta"}</div>
        <div style={{width:60}}></div>
      </div>
      <div className="screen-body">

        <div className="field">
          <label>Nombre de la receta</label>
          <input placeholder="Ej. Lentejas con chorizo" value={titulo} onChange={e=>setTitulo(e.target.value)} />
        </div>

        <div className="field">
          <label>Descripción breve (opcional)</label>
          <textarea rows={2} placeholder="Un plato de cuchara reconfortante, ideal para días fríos…" value={descripcion} onChange={e=>setDescripcion(e.target.value)} />
        </div>

        <div className="field-row">
          <div className="field">
            <label>Categoría</label>
            <select value={categoria} onChange={e=>setCategoria(e.target.value)}>
              {CATEGORIAS.map(c=> <option key={c.id} value={c.id}>{c.icon} {c.label}</option>)}
            </select>
          </div>
          <div className="field">
            <label>Tiempo (min)</label>
            <input type="number" min="0" placeholder="30" value={tiempo} onChange={e=>setTiempo(e.target.value)} />
          </div>
        </div>

        <div className="field">
          <label>Porciones base</label>
          <input
            type="number" min="1" placeholder="Ej. 2"
            value={porciones}
            onChange={e=>setPorciones(e.target.value)}
            className={porcionesValidas ? "" : "field-invalid"}
          />
          {!porcionesValidas && <p className="field-error-msg">Indica al menos 1 porción para poder guardar</p>}
        </div>

        <div className="section-label">Ingredientes</div>
        {ingredientes.map((ing, ingIdx)=>{
          const isNew = justAddedId===ing.id;
          const step = (ing.unidad==='g' || ing.unidad==='ml') ? 10 : 1;
          const kcalItemTotal = ing.kcalTotal ? Math.round(parseFloat(ing.kcalTotal)) : null;
          return (
          <div className={"ing-card"+(isNew?" ing-card-new":"")} key={ing.id}>
            <div className="ing-card-name-row" style={{position:'relative'}}>
              <input
                placeholder="Nombre del ingrediente"
                value={ing.nombre}
                autoComplete="off"
                autoFocus={isNew}
                className="ing-card-name-input"
                onChange={e=>handleNombreChange(ing, e.target.value)}
                onFocus={()=>{
                  const matches = suggestFoods(ing.nombre, alimentosPersonales, 5);
                  setSuggestions(matches);
                  setSuggestOpenFor(matches.length>0 ? ing.id : null);
                }}
                onBlur={()=> setTimeout(()=>setSuggestOpenFor(prev=> prev===ing.id ? null : prev), 150)}
              />
              <button className="ing-card-remove" onClick={()=>removeIngredient(ing.id)} aria-label="Quitar ingrediente">×</button>
              {suggestOpenFor===ing.id && suggestions.length>0 && (
                <div className="suggest-dropdown">
                  {suggestions.map((s,idx)=>(
                    <div key={idx} className="suggest-item" onMouseDown={()=>handleSelectSuggestion(ing, s)}>
                      <span className="suggest-name">{s.nombre}</span>
                      <span className="suggest-kcal">{s.kcal100} kcal/100{s.origen==="personal" ? " · tu tabla" : ""}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>

            <div className="ing-card-kcal-info">
              {ing.lookupStatus==="searching" && <span className="ing-kcal-hint">Buscando…</span>}
              {ing.lookupStatus==="found" && ing.kcalMode==="auto" && !manualKcalOpenFor[ing.id] && (
                <span className="ing-kcal-hint">
                  <span className="ing-kcal-chip found">✓ {ing.kcal100} kcal/100{ing.unidad==='ml'||ing.unidad==='l'?'ml':'g'}{ing.origen==="personal" ? " · tu tabla" : ""}</span>
                  {' '}<button type="button" className="ing-kcal-link" onClick={()=>setManualKcalOpenFor(prev=>({...prev,[ing.id]:true}))}>editar</button>
                  {!UNIDADES_PROPORCIONALES.includes(ing.unidad) && (
                    <span className="ing-kcal-hint" style={{display:'block', marginTop:4}}>Esta unidad no permite calcular el total solo; pulsa "editar" para poner las kcal directamente.</span>
                  )}
                </span>
              )}
              {ing.lookupStatus==="none" && !manualKcalOpenFor[ing.id] && ing.kcalMode!=="manual" && (
                <span className="ing-kcal-hint">
                  No está en la tabla ·{' '}
                  <button type="button" className="ing-kcal-link" onClick={()=>setManualKcalOpenFor(prev=>({...prev,[ing.id]:true}))}>añadir kcal/100g</button>
                </span>
              )}
              {(ing.kcalMode==="manual" || manualKcalOpenFor[ing.id]) && (
                UNIDADES_PROPORCIONALES.includes(ing.unidad) ? (
                  <div className="ing-kcal-manual-row">
                    <input
                      placeholder="Kcal/100g"
                      type="number" min="0" step="any"
                      className="ing-kcal-manual-input"
                      value={ing.kcal100}
                      autoFocus
                      onChange={e=>handleManualKcal100Change(ing, e.target.value)}
                      onBlur={()=>handleManualKcal100Blur(ing)}
                    />
                    <span className="ing-kcal-hint">kcal por 100{ing.unidad==='ml'||ing.unidad==='l'?'ml':'g'}</span>
                  </div>
                ) : (
                  <div className="ing-kcal-manual-row">
                    <input
                      placeholder="Kcal totales"
                      type="number" min="0" step="any"
                      className="ing-kcal-manual-input"
                      value={ing.kcalTotal}
                      autoFocus
                      onChange={e=>handleManualKcalDirectaChange(ing, e.target.value)}
                    />
                    <span className="ing-kcal-hint">kcal para {ing.cantidad||'?'} {ing.unidad}</span>
                  </div>
                )
              )}
              {!ing.lookupStatus && !manualKcalOpenFor[ing.id] && ing.kcalMode!=="manual" && (
                <span className="ing-kcal-hint">Escribe el nombre para calcular las kcal</span>
              )}
            </div>

            <div className="ing-card-controls">
              <div className="ing-qty-stepper">
                <button
                  type="button"
                  disabled={!ing.nombre.trim()}
                  onClick={()=>{
                    const newQty = Math.max(0, (parseFloat(ing.cantidad)||0) - step);
                    const newKcal = recalcKcalTotal(ing, newQty, ing.unidad);
                    updateIngredient(ing.id, {cantidad:newQty.toString(), kcalTotal:newKcal});
                  }}
                  aria-label="Menos cantidad"
                >−</button>
                <input
                  type="number" min="0" step="any"
                  value={ing.cantidad}
                  disabled={!ing.nombre.trim()}
                  onChange={e=>{
                    const newQty = e.target.value;
                    const newKcal = recalcKcalTotal(ing, newQty, ing.unidad);
                    updateIngredient(ing.id, {cantidad:newQty, kcalTotal:newKcal});
                  }}
                />
                <button
                  type="button"
                  disabled={!ing.nombre.trim()}
                  onClick={()=>{
                    const newQty = (parseFloat(ing.cantidad)||0) + step;
                    const newKcal = recalcKcalTotal(ing, newQty, ing.unidad);
                    updateIngredient(ing.id, {cantidad:newQty.toString(), kcalTotal:newKcal});
                  }}
                  aria-label="Más cantidad"
                >+</button>
              </div>
              <select
                className="ing-unidad-select"
                value={ing.unidad}
                onChange={e=>{
                  const newUnidad = e.target.value;
                  const eraProp = UNIDADES_PROPORCIONALES.includes(ing.unidad);
                  const esProp = UNIDADES_PROPORCIONALES.includes(newUnidad);
                  if(esProp){
                    // pasa a proporcional: recalcula desde kcal100 si lo hay, o queda vacío
                    const newKcal = recalcKcalTotal(ing, ing.cantidad, newUnidad);
                    updateIngredient(ing.id, {unidad:newUnidad, kcalTotal:newKcal});
                  } else {
                    // pasa a directo (ud, taza, cda...): conserva el total actual como punto de partida editable
                    updateIngredient(ing.id, {unidad:newUnidad, kcal100:"", kcalMode: ing.lookupStatus==="found" ? "manual" : ing.kcalMode});
                  }
                }}
              >
                {UNIDADES.map(u=> <option key={u} value={u}>{u}</option>)}
              </select>
              {kcalItemTotal!==null && (
                <span className="ing-card-kcal-total">{kcalItemTotal} kcal</span>
              )}
            </div>
          </div>
          );
        })}
        <button className="add-ing-btn" onClick={addIngredient}>+ Añadir ingrediente</button>

        {ingredientesConKcal>0 && (
          <div className="ing-total-row">
            <span>Total receta</span>
            <span className="ing-total-kcal">{Math.round(calcTotalKcalBase(ingredientes))} kcal</span>
          </div>
        )}

        <div className="section-label">Preparación</div>
        {pasos.map((p,i)=>(
          <div className="step-form-row" key={i}>
            <div className="step-num serif" style={{marginTop:10}}>{i+1}</div>
            <textarea rows={2} placeholder={`Paso ${i+1}…`} value={p} onChange={e=>updatePaso(i, e.target.value)} />
            <button className="remove-x" onClick={()=>removePaso(i)} aria-label="Quitar paso">×</button>
          </div>
        ))}
        <button className="add-step-btn" onClick={addPaso}>+ Añadir paso</button>

        <div className="field">
          <label>Notas (opcional)</label>
          <textarea rows={2} placeholder="Variantes, trucos, conservación…" value={notas} onChange={e=>setNotas(e.target.value)} />
        </div>

        <label style={{display:'flex', alignItems:'center', gap:10, fontSize:14, color:'#544e42', marginTop:8}}>
          <input type="checkbox" checked={destacada} onChange={e=>setDestacada(e.target.checked)} style={{width:'auto'}}/>
          Marcar como favorita
        </label>
      </div>

      <div className="save-bar">
        <button disabled={!canSave} onClick={handleSave}>{isEdit ? "Guardar cambios" : "Guardar receta"}</button>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

// ---------- Service worker registration (for installability) ----------
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
